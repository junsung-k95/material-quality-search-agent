## Render deployment configuration
## Docs: https://render.com/docs/infrastructure-as-code

services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  - type: web
    name: material-quality-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/start_api.sh
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false            # Set this in the Render dashboard
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: HF_HOME
        value: /app/.cache/huggingface
      - key: DB_PATH
        value: data/issues.db
      - key: CHROMA_PATH
        value: data/chroma

  # ── Streamlit UI ──────────────────────────────────────────────────────────
  - type: web
    name: material-quality-ui
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/start_ui.sh
    envVars:
      - key: API_BASE_URL
        sync: false            # Set this to the API service URL after deploying
                               # e.g. https://material-quality-api.onrender.com
      - key: HF_HOME
        value: /app/.cache/huggingface
